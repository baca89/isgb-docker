# isGB Spam Filter - Beispiel Mailbox-Konfiguration
# Kopieren und für jedes Postfach anpassen

[mailbox]
# Eindeutige Identifikation für dieses Postfach
name = user@example.com
enabled = true

[connection]
# Mail-Server Verbindungsdaten
host = mail.example.com
port = 993
username = user@example.com
# WICHTIG: Verwende ein App-Passwort oder ein sicheres Passwort
auth_secret = [REPLACE_WITH_YOUR_APP_PASSWORD]
use_ssl = true
use_tls = false
timeout = 30

[filter]
# Spam-Filter-Einstellungen
# Spam-Score Schwellenwert (höher = strenger)
spam_threshold = 5.0

# Maschinelles Lernen aktivieren
enable_learning = true
auto_learn_ham = true
auto_learn_spam = true

# Bayes-Datenbankpfad (relativ zum Container)
database_path = /var/lib/isgb/mailboxes/user@example.com/spam.db

# Weitere Filter
enable_spf_check = true
enable_dkim_check = true
enable_dmarc_check = true
enable_url_check = true

[actions]
# Aktionen wenn Spam erkannt wird
# Optionen: move, delete, mark_read, flag

# Verschiebe verdächtige Nachrichten in Spam-Ordner
move_to_folder = Spam
# move_to_folder_threshold = 3.0  # Nur bei höherem Score

# Lösche hochgradig verdächtige Nachrichten
delete_folder = Junk
delete_threshold = 8.0

# Ham-Lernordner: Mails, die fälschlicherweise als Spam markiert wurden (False Positives).
# Nachrichten in diesem Ordner werden als Ham trainiert und korrigieren den Bayes-Filter.
# Einfach eine falsch klassifizierte Mail dorthin verschieben – der nächste Check lernt sie.
ham_folder = INBOX.Spamfehler

# Spam-Lernordner: Zusätzliche bestätigte Spam-Mails für das Bayes-Training (optional).
# Die Mails werden als Spam gelernt, aber nicht automatisch verschoben/gelöscht.
# spam_learn_folder = INBOX.BestätigterSpam

# Markiere als gelesen
mark_as_read = false

# Flagge zuweisen
add_flag = Spam

[logging]
# Logging-Einstellungen
log_level = INFO
# log_file = /var/log/isgb/user@example.com.log
# Maximale Größe der Log-Datei in MB
max_log_size = 50
# Anzahl der Backup-Log-Dateien
backup_count = 5

[schedule]
# Zeitplan für Spam-Check
# Im CRON-Format oder einfach: "daily", "hourly", "every 5 minutes"
run_schedule = hourly
# Maximale Anzahl von Nachrichten pro Lauf
max_messages_per_run = 100

[advanced]
# Erweiterte Einstellungen
# Verwende IMAP Flags für Spam-Markierung
use_imap_flags = true

# Erstelle automatisch Spam-Ordner wenn nicht vorhanden
auto_create_folders = true

# Sanitize HTML in Nachrichten
sanitize_html = true

# PII (Personlich Identifiable Information) Detection
detect_pii = false
