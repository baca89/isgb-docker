version: '3.8'

services:
  isgb:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: isgb-spamfilter
    restart: unless-stopped

    # Volumes
    volumes:
      # Config-Verzeichnis mit Mailbox-Konfigurationen
      - ./config:/etc/isgb/mailboxes:ro
      # Logs
      - isgb-logs:/var/log/isgb
      # Persistente Datenbank
      - isgb-data:/var/lib/isgb
      # SpamAssassin Bayes-Datenbank (persistent)
      - isgb-sa-bayes:/root/.spamassassin
      # Optional: Lernverzeichnisse mit mbox/maildir-Dateien befüllen
      # - ./spam-learn:/var/lib/isgb/spam:ro
      # - ./ham-learn:/var/lib/isgb/ham:ro

    # Umgebungsvariablen
    environment:
      CONFIG_DIR: /etc/isgb/mailboxes
      LOG_DIR: /var/log/isgb
      LOG_LEVEL: INFO
      # TZ: Europe/Berlin
      # Optionale SpamAssassin Lernpfade (Standard: /var/lib/isgb/spam|ham)
      # SA_SPAM_DIR: /var/lib/isgb/spam
      # SA_HAM_DIR: /var/lib/isgb/ham
      # Intervall für Mailbox-Check in Sekunden (Standard: 900 = 15 Minuten)
      # IMAP_CHECK_INTERVAL: 900

    # Ports (spamd läuft intern auf Port 783, kein externer Zugriff benötigt)
    # ports:
    #   - "783:783"   # SpamAssassin spamd (nur bei externem Zugriff nötig)

    # Health Check
    healthcheck:
      test: ["CMD-SHELL", "test -s /var/run/spamd.pid"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

    # Resource-Limits
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

    # Netzwerk
    networks:
      - isgb-network

volumes:
  isgb-logs:
    driver: local
  isgb-data:
      isgb-sa-bayes:
        driver: local
    driver: local

networks:
  isgb-network:
    driver: bridge
