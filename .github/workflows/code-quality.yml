name: Code Quality & Linting

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  schedule:
    # TÃ¤glich um 2 Uhr nachts
    - cron: '0 2 * * *'

permissions:
  contents: read
  security-events: write

jobs:
  dockerfile-lint:
    runs-on: ubuntu-latest
    name: Lint Dockerfile
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Hadolint
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Dockerfile
          failure-threshold: warning

  shell-lint:
    runs-on: ubuntu-latest
    name: Lint Shell Scripts
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: Run ShellCheck
        run: |
          find . -name "*.sh" -type f | while read file; do
            echo "Checking $file..."
            shellcheck "$file" || exit 1
          done

  yaml-lint:
    runs-on: ubuntu-latest
    name: Lint YAML
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint

      - name: Run yamllint
        run: yamllint -c .yamllint .github/workflows/*.yml docker-compose.yml

  markdown-lint:
    runs-on: ubuntu-latest
    name: Lint Markdown
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Markdownlint
        uses: nosborn/github-action-markdown-cli@v3.3.0
        with:
          files: .
          config_file: .markdownlintrc

  security-scan:
    runs-on: ubuntu-latest
    name: Security Scan
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-fs-results.sarif'

      - name: Check if SARIF file exists and upload
        if: always() && hashFiles('trivy-fs-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-fs-results.sarif'
          category: 'trivy-filesystem'
          wait-for-processing: false

  license-check:
    runs-on: ubuntu-latest
    name: License Check
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check License
        run: |
          if [ ! -f LICENSE ]; then
            echo "LICENSE file missing!"
            exit 1
          fi
          echo "âœ“ LICENSE file found"

  dependency-check:
    runs-on: ubuntu-latest
    name: Dependency Check
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check Dockerfile for outdated base images
        run: |
          echo "Checking Debian version in Dockerfile..."
          grep -i "FROM debian:" Dockerfile
          echo "Note: Ensure using latest stable version"

      - name: Check for hardcoded secrets
        run: |
          echo "Scanning for hardcoded secrets..."
          # Suche nach echten PasswÃ¶rtern/Secrets, nicht nach Platzhaltern oder Beispielen
          if grep -r "password\|secret\|key\|token" . \
            --include="*.sh" \
            --include="*.py" \
            --include="Dockerfile" \
            --exclude-dir=.git \
            --exclude-dir=.github \
            --exclude-dir=config \
            --exclude="*.md" \
            | grep -v "\[.*_HERE\]\|\[REPLACE_WITH\|your_\|example\|demo\|test\|#" ; then
            echo "âš ï¸  Potential hardcoded secrets found!"
            exit 1
          fi
          echo "âœ“ No suspicious hardcoded secrets found"
